    <script>
        document.addEventListener('DOMContentLoaded', function() {
             // Polyfill for Array.prototype.forEach
        if (!Array.prototype.forEach) {
            Array.prototype.forEach = function(callback, thisArg) {
                var T, k;
                var O = Object(this);
                var len = O.length >>> 0;
                if (typeof callback !== "function") {
                    throw new TypeError(callback + " is not a function");
                }
                if (thisArg) {
                    T = thisArg;
                }
                k = 0;
                while (k < len) {
                    var kValue;
                    if (k in O) {
                        kValue = O[k];
                        callback.call(T, kValue, k, O);
                    }
                    k++;
                }
            };
        }

        // Polyfill for requestAnimationFrame
        (function() {
            var lastTime = 0;
            var vendors = ['ms', 'moz', 'webkit', 'o'];
            for (var i = 0; i < vendors.length && !window.requestAnimationFrame; ++i) {
                window.requestAnimationFrame = window[vendors[i] + 'RequestAnimationFrame'];
                window.cancelAnimationFrame = window[vendors[i] + 'CancelAnimationFrame'] || window[vendors[i] + 'CancelRequestAnimationFrame'];
            }
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = function(callback, element) {
                    var currTime = new Date().getTime();
                    var timeToCall = Math.max(0, 16 - (currTime - lastTime));
                    var id = window.setTimeout(function() { callback(currTime + timeToCall); }, timeToCall);
                    lastTime = currTime + timeToCall;
                    return id;
                };
            }
            if (!window.cancelAnimationFrame) {
                window.cancelAnimationFrame = function(id) {
                    clearTimeout(id);
                };
            }
        }());

        // Polyfill for Element.prototype.classList
        if (!('classList' in document.createElement('_'))) {
            (function(view) {
                "use strict";
                if (!('Element' in view) || 'classList' in document.documentElement) return;
                var classListProp = "classList",
                    protoProp = "prototype",
                    elemCtrProto = view.Element[protoProp],
                    objCtrProto = view.Object[protoProp],
                    classListAccessors = {
                        add: function(token) {
                            if (this.contains(token)) return;
                            this[this.length] = token;
                            this.length++;
                        },
                        contains: function(token) {
                            return this.indexOf(token) !== -1;
                        },
                        item: function(i) {
                            return this[i] || null;
                        },
                        remove: function(token) {
                            var index = this.indexOf(token);
                            if (index === -1) return;
                            this.splice(index, 1);
                        },
                        toggle: function(token) {
                            if (this.contains(token)) {
                                this.remove(token);
                                return false;
                            } else {
                                this.add(token);
                                return true;
                            }
                        }
                    },
                    createClassList = function(elem) {
                        var classList = [];
                        Object.defineProperty(elem, classListProp, {
                            get: function() {
                                return classList;
                            }
                        });
                        Object.keys(classListAccessors).forEach(function(method) {
                            classList[method] = classListAccessors[method];
                        });
                    };

                view.Element[protoProp].constructor = function() {
                    createClassList(this);
                };
                var old = view.Element[protoProp].constructor;
                view.Element[protoProp].constructor = function(elem) {
                    createClassList(this);
                    old.apply(this, arguments);
                };

                view.Element.prototype = Object.create(view.Element[protoProp]);

            }(window));
        }
        });
