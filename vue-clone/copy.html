<script>

// circle 전체 화면 회전 함수
const aniFulllScreenRotate = () => {
    const circleWrap = document.querySelector('.circle-wrap'); // circle-wrap 요소 선택
    let rotation = 0; // 초기 회전 각도 설정

    // 2초마다 회전 각도 증가하며 설정
    const interval = setInterval(() => {
        rotation += 1; // 시계 방향으로 1도씩 회전
        circleWrap.style.transform = `rotate(${rotation}deg)`;

        // 회전 각도가 360도에 도달하면 인터벌 중지
        if (rotation >= 360) {
            clearInterval(interval);
            moveCircleToCenter();
        }
    }, 5); // 20ms 마다 회전 각도를 증가시켜 부드러운 애니메이션 효과를 줍니다.
};

// 함수 호출 예시
aniFulllScreenRotate();

// 정가운데로 이동하는 함수
function moveCircleToCenter() {

    const circle = document.querySelector('.circle.pos8');
    const section = document.querySelector('.circle-wrap');

    const centerX = section.offsetWidth /2;
    const centerY = section.offsetHeight /2;

    // 애니메이션 효과 설정
    circle.style.transition = 'left .5s ease, top .5s ease';

    // 일정 시간 지연 후 위치 변경
    setTimeout(() => {
        circle.style.left = `${centerX - circle.offsetWidth / 2}px`;
        circle.style.top = `${centerY - circle.offsetHeight / 2}px`;
    }, 300); // 100ms 지연 후 이동 시작
   
}




</script>
